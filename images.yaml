---
defaults:
  kernel_flavor: main
  version: 44
  akmods_target: common

arch-only-x86: &arch-only-x86
  architecture:
    - x86_64

akmods-base: &akmods-base
  org: ublue-os
  registry: ghcr.io
  repo: akmods
  transport: docker://

akmods-common: &akmods-common
  name: akmods
  description: "A caching layer for pre-built akmod RPMs"

ogc-desktop-build-group-only-x86: &ogc-desktop-build-group-only-x86
  common:
    !!merge <<:
      - *akmods-base
      - *akmods-common
      - *arch-only-x86

images:
  44:
    ogc:
      !!merge <<:
        - *ogc-desktop-build-group-only-x86
